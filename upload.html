<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DISTRO | Submit Demo</title>
    <style>
        /* Стили для того, чтобы форма смотрелась бесшовно */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #0a0a0a; /* Цвет фона твоего сайта */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
        }

        .iframe-wrapper {
            width: 100%;
            max-width: 800px; /* Оптимальная ширина для анкеты */
            height: 95vh; /* Высота почти на весь экран */
            margin: 20px;
            border-radius: 24px; /* Мягкие углы как у карточек артистов */
            overflow: hidden;
            border: 1px solid #333; /* Тонкая рамка */
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
        }
    </style>
</head>
<body>

    <div class="iframe-wrapper">
        <iframe 
            src="https://distro.fillout.com/i" 
            title="Distro Artist Application"
            allow="geolocation; microphone; camera"
            loading="lazy">
        </iframe>
    </div>

</body>
</html>
