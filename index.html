<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DISTRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --accent-color: #b388ff; 
            --text-color: #ffffff;
            --card-bg: #111111;
            --transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { cursor: none !important; } /* Отключаем дефолтный курсор */

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* Кастомный курсор */
        #cursor {
            width: 20px;
            height: 20px;
            background-color: var(--accent-color);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: difference;
            transition: transform 0.15s ease-out;
            transform: translate(-50%, -50%);
        }

        #cursor-follower {
            width: 40px;
            height: 40px;
            border: 1px solid var(--accent-color);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            transition: all 0.3s ease-out;
            transform: translate(-50%, -50%);
        }

        header {
            padding: 30px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 90%;
            top: 0;
            z-index: 1000;
        }

        .logo-img { height: 35px; }

        .social-header a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 20px;
            transition: var(--transition);
        }

        .social-header a:hover { color: var(--accent-color); }

        /* Hero */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle at 50% 50%, #1a112f 0%, var(--bg-color) 80%);
        }

        .hero h1 {
            font-size: clamp(50px, 10vw, 120px);
            font-weight: 900;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: -4px;
        }

        /* Горизонтальный скролл артистов */
        .artists-section {
            padding: 100px 0;
            overflow: hidden;
        }

        .section-title {
            padding-left: 5%;
            font-size: 40px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .horizontal-scroll {
            display: flex;
            overflow-x: auto;
            padding: 20px 5%;
            gap: 30px;
            scroll-behavior: smooth;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .horizontal-scroll::-webkit-scrollbar { display: none; }

        .artist-card {
            min-width: 450px;
            aspect-ratio: 16 / 9;
            background: var(--card-bg);
            border-radius: 30px;
            overflow: hidden;
            position: relative;
            flex-shrink: 0;
            transition: var(--transition);
        }

        .artist-card:hover { transform: scale(0.96); }

        .artist-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) contrast(1.1);
            transition: var(--transition);
        }

        .artist-card:hover .artist-img { filter: grayscale(0%); transform: scale(1.1); }

        .artist-info {
            position: absolute;
            bottom: 30px;
            left: 30px;
            z-index: 2;
        }

        /* Футер и Соцсети */
        .footer {
            padding: 100px 5% 50px;
            background: #000;
            text-align: center;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 50px;
        }

        .social-links a {
            color: white;
            font-size: 14px;
            text-decoration: none;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 2px;
            transition: var(--transition);
            border-bottom: 1px solid transparent;
        }

        .social-links a:hover {
            color: var(--accent-color);
            border-bottom: 1px solid var(--accent-color);
        }

        .btn {
            background: var(--accent-color);
            color: #000;
            padding: 20px 60px;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 900;
            transition: var(--transition);
            display: inline-block;
        }

    </style>
</head>
<body>

    <div id="cursor"></div>
    <div id="cursor-follower"></div>

    <header>
        <img src="Distro.png" alt="DISTRO" class="logo-img">
        <nav class="social-header">
            <a href="https://t.me/distro_off" target="_blank">TG</a>
            <a href="https://vk.com/distro_music" target="_blank">VK</a>
            <a href="https://www.youtube.com/@Distrobution" target="_blank">YT</a>
        </nav>
    </header>

    <section class="hero">
        <h1>DISTRO</h1>
        <p style="opacity: 0.6; letter-spacing: 2px;">MUSIC LABEL</p>
        <br>
        <a href="https://distro.fillout.com/i" target="_blank" class="btn">ОТПРАВИТЬ ДЕМО</a>
    </section>

    <section class="artists-section">
        <h2 class="section-title">Artists</h2>
        <div class="horizontal-scroll" id="scrollContainer">
            <div class="artist-card"><img src="sp.png" class="artist-img"><div class="artist-info"><h3>$onik play</h3></div></div>
            <div class="artist-card"><img src="az.jpg" class="artist-img"><div class="artist-info"><h3>AzerOne</h3></div></div>
            <div class="artist-card"><img src="tai.jpg" class="artist-img"><div class="artist-info"><h3>ТЕЙЛЕС</h3></div></div>
            <div class="artist-card"><img src="azerslow.jpg" class="artist-img"><div class="artist-info"><h3>азерслоу</h3></div></div>
            <div class="artist-card"><img src="ban.jpg" class="artist-img"><div class="artist-info"><h3>Bandit001</h3></div></div>
            <div class="artist-card"><img src="wbr.jpg" class="artist-img"><div class="artist-info"><h3>WBR Egor Gamer999</h3></div></div>
            <div class="artist-card"><img src="haz.jpg" class="artist-img"><div class="artist-info"><h3>Egorhazbin9993</h3></div></div>
        </div>
    </section>

    <footer class="footer">
        <div class="social-links">
            <a href="https://t.me/distro_off">Telegram</a>
            <a href="https://vk.com/distro_music">Vkontakte</a>
            <a href="https://www.youtube.com/@Distrobution">YouTube</a>
        </div>
        <p style="opacity: 0.3; font-size: 12px;">© 2026 DISTRO.</p>
    </footer>

    <script>
        // Скрипт плавного курсора
        const cursor = document.getElementById('cursor');
        const follower = document.getElementById('cursor-follower');
        
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            
            setTimeout(() => {
                follower.style.left = e.clientX + 'px';
                follower.style.top = e.clientY + 'px';
            }, 50);
        });

        // Скролл колесиком мыши по горизонтали в секции артистов
        const scrollContainer = document.getElementById('scrollContainer');
        scrollContainer.addEventListener('wheel', (evt) => {
            evt.preventDefault();
            scrollContainer.scrollLeft += evt.deltaY;
        });

        // Эффект увеличения курсора на ссылках
        const links = document.querySelectorAll('a, .artist-card');
        links.forEach(link => {
            link.addEventListener('mouseenter', () => {
                follower.style.transform = 'translate(-50%, -50%) scale(2)';
                follower.style.background = 'rgba(179, 136, 255, 0.1)';
            });
            link.addEventListener('mouseleave', () => {
                follower.style.transform = 'translate(-50%, -50%) scale(1)';
                follower.style.background = 'transparent';
            });
        });
    </script>
</body>
</html>
